<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}FlowMap{% endblock %}</title>
  <script src="/static/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e0e0e0;
      --muted: #8a8fa8;
      --accent: #4f8ef7;
      --up: #26a69a;
      --down: #ef5350;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      display: flex; align-items: center; gap: 24px;
      padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    nav .logo { font-size: 18px; font-weight: 700; color: var(--accent); margin-right: auto; }
    nav a { color: var(--muted); font-size: 13px; }
    nav a.active, nav a:hover { color: var(--text); }

    #lang-toggle {
      padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 12px; cursor: pointer;
      transition: all .15s; white-space: nowrap;
    }
    #lang-toggle:hover { border-color: var(--accent); color: var(--accent); }

    .container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px;
    }
    .card-title { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media (max-width: 900px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }

    .up { color: var(--up); }
    .down { color: var(--down); }
    .muted { color: var(--muted); }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 12px; font-weight: 600;
    }

    .chart-controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .btn {
      padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 12px; cursor: pointer;
      transition: all .15s;
    }
    .btn:hover, .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
    .section-title { font-size: 16px; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 10px; border-bottom: 1px solid var(--border); }
    td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.03); }

    .spinner {
      width: 24px; height: 24px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #refresh-status {
      display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted);
    }
    #refresh-status .dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
      transition: background .3s;
    }
    #refresh-status .dot.live { background: var(--up); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.4; } }
    #refresh-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 5px; padding: 3px 8px; font-size: 14px; cursor: pointer;
      transition: all .15s; line-height: 1;
    }
    #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    #refresh-btn.spinning { animation: spin .6s linear infinite; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <span class="logo">FlowMap</span>
  <a href="/" {% if request.url.path == "/" %}class="active"{% endif %} data-i18n="nav.dashboard">Dashboard</a>
  <a href="/sectors" {% if request.url.path == "/sectors" %}class="active"{% endif %} data-i18n="nav.sectors">Sectors</a>
  <a href="/fear" {% if request.url.path == "/fear" %}class="active"{% endif %} data-i18n="nav.fear">Fear &amp; Correlation</a>
  <a href="/history" {% if request.url.path == "/history" %}class="active"{% endif %} data-i18n="nav.history">History</a>
  <div id="refresh-status">
    <span class="dot" id="status-dot"></span>
    <span data-i18n="refresh.updated">Updated</span>
    <span id="updated-time">—</span>
    <button id="refresh-btn" onclick="manualRefresh()" title="Refresh">↻</button>
  </div>
  <button id="lang-toggle" onclick="toggleLang()">한국어</button>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
<script>
  document.querySelectorAll('nav a').forEach(a => {
    if (a.getAttribute('href') === window.location.pathname) a.classList.add('active');
  });
  applyLang();

  // ── Auto-refresh & last-updated ──────────────────────────────
  const AUTO_REFRESH_MS = 5 * 60 * 1000;  // 5 minutes
  let lastRefreshAt = null;

  function markUpdated() {
    lastRefreshAt = new Date();
    _renderUpdatedTime();
    const dot = document.getElementById('status-dot');
    if (dot) { dot.classList.add('live'); }
  }

  function _renderUpdatedTime() {
    const el = document.getElementById('updated-time');
    if (!el || !lastRefreshAt) return;
    const diffMin = Math.floor((Date.now() - lastRefreshAt) / 60000);
    el.textContent = diffMin === 0
      ? t('refresh.just_now')
      : diffMin + ' ' + t('refresh.min_ago');
  }

  // Keep "X min ago" text ticking every minute
  setInterval(_renderUpdatedTime, 60000);

  // Update "X min ago" label text when language changes
  document.addEventListener('langchange', _renderUpdatedTime);

  function manualRefresh() {
    const btn = document.getElementById('refresh-btn');
    if (btn) { btn.classList.add('spinning'); setTimeout(() => btn.classList.remove('spinning'), 600); }
    if (window.pageReload) { window.pageReload(); markUpdated(); }
  }

  // Auto-refresh timer — starts when pageReload is registered
  function startAutoRefresh() {
    setInterval(() => {
      if (window.pageReload) { window.pageReload(); markUpdated(); }
    }, AUTO_REFRESH_MS);
  }
  startAutoRefresh();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
